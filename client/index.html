<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/crevo-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crevo - Your Agency's All-in-One Project Portal</title>
    <meta
      name="description"
      content="Crevo is the collaborative workspace for agencies to manage projects, tasks, notes, chat, assets, and team operations in one place."
    />
    <meta
      name="keywords"
      content="Crevo, agency workspace, project management, team collaboration, creative operations, notes, chat"
    />
    <meta name="application-name" content="Crevo" />
    <meta name="apple-mobile-web-app-title" content="Crevo" />
    <meta property="og:title" content="Crevo" />
    <meta
      property="og:description"
      content="Built for agencies. Not adapted for them."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crevo" />
    <meta
      name="twitter:description"
      content="Built for agencies. Not adapted for them."
    />
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem("crevo-theme");
          if (savedTheme === "light") return;
        } catch (error) {}
        document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script
      src="https://mcp.figma.com/mcp/html-to-design/capture.js"
      async
    ></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
